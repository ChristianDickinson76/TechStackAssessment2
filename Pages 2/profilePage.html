<!DOCTYPE html>
<html lang="en">
<head>
  <title>Profile Page</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="./assets/css/styles.css">
  <style>
    .profile-pic-circle {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #007bff;
      margin: 0 auto;
      display: block;
    }
  </style>
</head>

<body> 

<div class="mt-1 p-2 bg-primary text-white d-flex align-items-center">
  <!-- Title centered across the screen -->

  <div class="flex-grow-1 text-center justify-content-center">
    <h1>Skill Hub</h1>
    <p>Grow, together.</p>
  </div>
</div>

<nav class="navbar navbar-expand-sm bg-dark navbar-dark">
  <div class="container-fluid">
    <ul class="navbar-nav w-100 d-flex justify-content-evenly flex-wrap">
      <li class="nav-item"><a class="nav-link" href="/landing">Home</a></li>
      <li class="nav-item"><a class="nav-link active" href="/profile">Profile</a></li>
      <li class="nav-item"><a class="nav-link" href="/support">Help</a></li>
    </ul>
  </div>
</nav>

<div class="container mt-4">
  <div class="row">
    <div class="col-md-4">
      <div class="card">
        <div class="card-body text-center">
          <img id="profileImage" src="" alt="Profile" class="profile-pic-circle" style="display:none;">
          <h5 class="card-title mt-3" id="displayFullname">Loading...</h5>
          <a href="/editprofile" class="btn btn-primary w-100">Edit Profile</a>
          <a href="/logout" class="btn btn-danger w-100 mt-2">Logout</a>
        </div>
      </div>
    </div>

    <div class="col-md-8">
      <div class="card">
        <div class="card-body">
          <h5 class="card-title">Profile Details</h5>
          
          <div class="row mb-3">
            <div class="col-sm-3">
              <h6 class="mb-0">Bio</h6>
            </div>
            <div class="col-sm-9 text-secondary">
              <span id="displayBio">Not provided</span>
            </div>
          </div>

          <hr>

          <div class="row mb-3">
            <div class="col-sm-3">
              <h6 class="mb-0">Hobbies</h6>
            </div>
            <div class="col-sm-9 text-secondary">
              <span id="displayHobbies">Not provided</span>
            </div>
          </div>

          <hr>

          <div class="row mb-3">
            <div class="col-sm-3">
              <h6 class="mb-0">Education</h6>
            </div>
            <div class="col-sm-9 text-secondary">
              <span id="displayEducation">Not provided</span>
            </div>
          </div>

          <hr>

          <div class="row">
            <div class="col-sm-3">
              <h6 class="mb-0">Favourite Food</h6>
            </div>
            <div class="col-sm-9 text-secondary">
              <span id="displayFavoriteFood">Not provided</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  fetch('/api/profile')
    .then(r => {
      if (!r.ok) throw new Error('Failed to load profile');
      return r.json();
    })
    .then(data => {
      document.getElementById('displayFullname').textContent = data.fullname || 'User';
      document.getElementById('displayBio').textContent = data.bio || 'Not provided';
      document.getElementById('displayHobbies').textContent = (data.hobbies || []).length > 0 
        ? data.hobbies.join(', ') 
        : 'Not provided';
      document.getElementById('displayEducation').textContent = data.education || 'Not provided';
      document.getElementById('displayFavoriteFood').textContent = data.favoriteFood || 'Not provided';
      
      if (data.profileImage) {
        const img = document.getElementById('profileImage');
        img.src = data.profileImage;
        img.style.display = 'block';
      }
    })
    .catch(err => {
      console.error('Error loading profile:', err);
      document.getElementById('displayFullname').textContent = 'Error loading profile';
    });
</script>

</body>

<footer>
  <p>Â© 2025 Skill Hub. All rights reserved.</p>
</footer>

<script src="./assets/js/common.js"></script>

</html>
