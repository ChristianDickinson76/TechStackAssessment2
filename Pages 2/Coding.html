<!DOCTYPE html>
<html lang="en">
<head>
  <title>Coding</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="./assets/css/styles.css">
</head>

<body>
  <div class="mt-1 p-2 bg-primary text-white d-flex align-items-center">
    <div class="flex-grow-1 text-center justify-content-center">
      <h1>Skill Hub</h1>
      <p>Grow, together.</p>
    </div>
  </div>

  <nav class="navbar navbar-expand-sm bg-dark navbar-dark">
    <div class="container-fluid">
      <ul class="navbar-nav w-100 d-flex justify-content-evenly flex-wrap">
        <li class="nav-item"><a class="nav-link" href="/landing">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="/profile">Profile</a></li>
        <li class="nav-item"><a class="nav-link" href="/support">Help</a></li>
      </ul>
    </div>
  </nav>

  <div class="container">
    <div class="main-body">
      <div class="row gutters-sm">
        <div class="col-md-4 mb-3">
          <button class="btn btn-primary w-100 mb-3" data-bs-toggle="modal" data-bs-target="#resourceModal">+ Post Resource</button>
          <div class="card">
            <div class="card-body">
              <div class="d-flex flex-column align-items-center text-start">
                <h4>Welcome to Coding</h4>
                <h6>Rules</h6>
                <ul>
                  <li>Share helpful tutorials and tools</li>
                  <li>Credit original sources</li>
                  <li>Be constructive with feedback</li>
                  <li>Keep content relevant to coding</li>
                </ul>
              </div>
            </div>
          </div>
        </div>

        <div class="col-md-8">
          <div class="input-group mb-3">
            <input id="resourceSearchInput" type="text" class="form-control" placeholder="Search resources by title or description...">
          </div>
          <div id="resourcesContainer" class="row gutters-sm"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="resourceModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Post a Resource</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <form action="/api/resources/create" method="post" enctype="multipart/form-data">
          <input type="hidden" name="hobby" value="coding">
          <div class="modal-body">
            <div class="mb-3">
              <label for="title" class="form-label">Title</label>
              <input id="title" name="title" type="text" class="form-control" required>
            </div>
            <div class="mb-3">
              <label for="description" class="form-label">Description</label>
              <textarea id="description" name="description" rows="4" class="form-control" required></textarea>
            </div>
            <div class="mb-3">
              <label for="link" class="form-label">Link (Optional)</label>
              <input id="link" name="link" type="url" class="form-control" placeholder="https://example.com">
            </div>
            <div class="mb-3">
              <label for="image" class="form-label">Image</label>
              <input id="image" name="image" type="file" class="form-control" accept=".png,.jpg,.jpeg,.gif,.webp">
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary">Post Resource</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="modal fade" id="resourceViewModal" tabindex="-1">
    <div class="modal-dialog modal-fullscreen">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="resourceViewTitle">Resource</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body d-flex flex-column">
          <div id="resourceViewContent" class="flex-grow-1 overflow-auto"></div>
          <hr>
          <div class="mt-auto">
            <h6>Comments</h6>
            <div id="commentList" class="mb-3"></div>
            <div class="input-group">
              <textarea id="commentInput" class="form-control" rows="2" placeholder="Write a comment..."></textarea>
              <button id="commentSubmitBtn" class="btn btn-primary" type="button">Post</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer>
    <p>© 2025 Skill Hub. All rights reserved.</p>
  </footer>

  <script src="./assets/js/common.js"></script>
  <script>
    const HOBBY_SLUG = "coding";
    let activeResourceId = null;

    function applyVoteState(card, userVote) {
      const up = card.querySelector(".vote-up");
      const down = card.querySelector(".vote-down");
      up.classList.remove("btn-success", "btn-outline-success");
      down.classList.remove("btn-danger", "btn-outline-danger");

      if (userVote === 1) {
        up.classList.add("btn-success");
        down.classList.add("btn-outline-danger");
      } else if (userVote === -1) {
        up.classList.add("btn-outline-success");
        down.classList.add("btn-danger");
      } else {
        up.classList.add("btn-outline-success");
        down.classList.add("btn-outline-danger");
      }
    }

    async function voteResource(resourceId, type, card) {
      const res = await fetch(`/api/resources/${resourceId}/vote`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "same-origin",
        body: JSON.stringify({ type })
      });
      const data = await res.json();
      if (!res.ok) return alert(data.error || "Vote failed");

      card.querySelector(".vote-count").textContent = data.votes;
      applyVoteState(card, data.userVote);
      card.dataset.userVote = String(data.userVote);
    }

    async function loadComments(resourceId) {
      const res = await fetch(`/api/resources/${resourceId}/comments`);
      const list = await res.json();
      document.getElementById("commentList").innerHTML = list.length
        ? list.map(c => `
            <div class="border rounded p-2 mb-2">
              <div class="d-flex justify-content-between">
                <strong>${c.authorName || "User"}</strong>
                <small class="text-muted">${new Date(c.createdAt).toLocaleString()}</small>
              </div>
              <div>${c.text}</div>
            </div>
          `).join("")
        : '<p class="text-muted mb-0">No comments yet.</p>';
    }

    async function openResourceModal(resourceId) {
      activeResourceId = resourceId;

      const [resourceRes, commentsRes] = await Promise.all([
        fetch(`/api/resources/${resourceId}`),
        fetch(`/api/resources/${resourceId}/comments`)
      ]);

      const resource = await resourceRes.json();
      const commentsList = await commentsRes.json();

      document.getElementById("resourceViewTitle").textContent = resource.title || "Resource";
      document.getElementById("resourceViewContent").innerHTML = `
        <div class="card mb-3">
          <div class="card-body">
            <h3 class="mb-3">${resource.title || ""}</h3>
            ${resource.image ? `<img src="${resource.image}" class="img-fluid rounded mb-3" style="max-height:420px;object-fit:cover;width:100%;">` : ""}
            <p class="mb-3">${resource.description || ""}</p>
            ${resource.link ? `<a href="${resource.link}" target="_blank" rel="noopener" class="btn btn-info">Visit Link</a>` : ""}
          </div>
        </div>
      `;

      document.getElementById("commentList").innerHTML = commentsList.length
        ? commentsList.map(c => `
            <div class="border rounded p-2 mb-2">
              <div class="d-flex justify-content-between">
                <strong>${c.authorName || "User"}</strong>
                <small class="text-muted">${new Date(c.createdAt).toLocaleString()}</small>
              </div>
              <div>${c.text}</div>
            </div>
          `).join("")
        : '<p class="text-muted mb-0">No comments yet.</p>';

      document.getElementById("commentInput").value = "";
      new bootstrap.Modal(document.getElementById("resourceViewModal")).show();
    }

    async function submitComment() {
      if (!activeResourceId) return;
      const input = document.getElementById("commentInput");
      const text = input.value.trim();
      if (!text) return;

      const res = await fetch(`/api/resources/${activeResourceId}/comments`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "same-origin",
        body: JSON.stringify({ text })
      });

      const data = await res.json();
      if (!res.ok) return alert(data.error || "Failed to post comment");

      input.value = "";
      await loadComments(activeResourceId);
    }

    async function loadResources(searchTerm = "") {
      const container = document.getElementById("resourcesContainer");
      const res = await fetch(`/api/resources/${HOBBY_SLUG}?q=${encodeURIComponent(searchTerm)}`);
      const list = await res.json();

      container.innerHTML = list.map(r => `
        <div class="col-sm-6 mb-3">
          <div class="card h-100 resource-card" data-resource-id="${r._id}" data-user-vote="${r.currentUserVote || 0}" role="button" tabindex="0">
            <div class="card-body d-flex flex-column">
              <h6>${r.title}</h6>
              ${r.image ? `<img src="${r.image}" class="img-fluid rounded mb-2" style="width:100%;height:200px;object-fit:cover;">` : ""}
              <p class="text-secondary mb-2">${(r.description || "").substring(0, 100)}</p>
              ${r.link ? `<a href="${r.link}" target="_blank" rel="noopener" class="btn btn-sm btn-info mb-2">Visit Link</a>` : ""}
              <div class="vote-section mt-auto pt-2 d-flex align-items-center justify-content-center gap-2">
                <button type="button" class="btn btn-sm vote-up" aria-label="Upvote">&#9650;</button>
                <span class="vote-count">${r.votes || 0}</span>
                <button type="button" class="btn btn-sm vote-down" aria-label="Downvote">&#9660;</button>
              </div>
            </div>
          </div>
        </div>
      `).join("");

      container.querySelectorAll("[data-resource-id]").forEach(card => {
        applyVoteState(card, Number(card.dataset.userVote || 0));
        const id = card.dataset.resourceId;

        card.addEventListener("click", (e) => {
          if (e.target.closest("button") || e.target.closest("a")) return;
          openResourceModal(id);
        });

        card.addEventListener("keydown", (e) => {
          if (e.key === "Enter") openResourceModal(id);
        });

        card.querySelector(".vote-up").addEventListener("click", (e) => {
          e.stopPropagation();
          voteResource(id, "up", card);
        });

        card.querySelector(".vote-down").addEventListener("click", (e) => {
          e.stopPropagation();
          voteResource(id, "down", card);
        });
      });
    }

    document.getElementById("resourceSearchInput")?.addEventListener("keydown", (e) => {
      if (e.key === "Enter") loadResources((e.target.value || "").trim());
    });

    document.getElementById("commentSubmitBtn")?.addEventListener("click", submitComment);
    document.getElementById("commentInput")?.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) submitComment();
    });

    loadResources();
  </script>
</body>
</html>
