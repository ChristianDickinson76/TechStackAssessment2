<script src="./assets/js/common.js"></script>
<script>
  /**
   * Purpose: Load the most recent resource and render it in the landing tile.
   * Data handled:
   * - Input: none (uses fixed endpoint query limit=1)
   * - API response: [{ title, description, image, link, hobby }]
   * - Output: updates #recentPostsTile innerHTML
   */
  async function loadLatestResources() {
    const res = await fetch("/api/resources/latest?limit=1");
    const list = await res.json();
    const tile = document.getElementById("recentPostsTile");

    tile.innerHTML = list.length
      ? list.map(r => `
          <div class="card-body text-start align-items-center">
            ${r.image ? `<img src="${r.image}" alt="Post image" class="img-fluid rounded mb-2">` : ""}
            <h6>${r.title || ""}</h6>
            <p class="text-secondary mb-1">${(r.description || "").substring(0, 140)}</p>
            ${r.link ? `<a href="${r.link}" target="_blank" rel="noopener">Visit link</a>` : ""}
            <small class="text-muted d-block mt-1">From ${r.hobby || "a hobby"}</small>
          </div>
        `).join("")
      : '<div class="card-body"><p class="text-muted mb-0">No recent resources yet.</p></div>';
  }

  // Purpose: Initial page load fetch for latest-resource preview tile.
  loadLatestResources();
</script>
