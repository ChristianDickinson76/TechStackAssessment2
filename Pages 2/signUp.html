<!DOCTYPE html>
<html lang="en">
<head>
  <title>Sign Up</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Use Bootstrap 5 (faster) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body>

<div class="container mt-5">
  <form action="/signup" method="post" enctype="multipart/form-data">
    <div class="row">
      <h2 class="text-center mb-4">Sign Up</h2>

      <div class="col-md-8 offset-md-2">
        <div class="mb-3">
          <input type="text" name="fullname" class="form-control" placeholder="Full Name*" required>
        </div>

        <div class="mb-3">
          <input type="text" name="username" class="form-control" placeholder="Username*" required>
        </div>

        <div class="mb-3">
          <input type="email" name="email" class="form-control" placeholder="Email Address*" required>
        </div>

        <div class="mb-3">
          <input type="password" name="password" class="form-control" placeholder="Password*" required>
        </div>

        <div class="mb-3">
          <input type="password" name="confirmPassword" class="form-control" placeholder="Confirm Password*" required>
        </div>

        <div class="mb-3">
          <input name="dob" class="form-control" type="date" placeholder="Date of Birth*" required>
        </div>

        <div class="mb-3">
          <select name="pronouns" class="form-select" required>
            <option value="" disabled selected>Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Non-Binary">Non-Binary</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="mb-3">
          <input type="tel" name="phone" class="form-control" placeholder="Telephone Number">
        </div>

        <div class="mb-3">
          <input type="file" name="profileImage" id="pfp" class="form-control" accept=".png,.jpg,.jpeg,.gif,.webp">
        </div>

        <div class="mb-3">
          <select name="interests" class="form-select" multiple>
            <option value="" disabled>Interests (Ctrl+click for multiple)</option>
            <option value="AI">AI</option>
            <option value="Coding">Coding</option>
            <option value="Cooking">Cooking</option>
            <option value="Football">Football</option>
            <option value="Travel">Travel</option>
            <option value="Sports">Sports</option>
            <option value="Books">Books</option>
          </select>
        </div>

        <p class="text-muted small">* Required fields</p>

        <div class="mb-3 form-check">
          <input type="checkbox" class="form-check-input" id="remember" name="remember" checked>
          <label class="form-check-label" for="remember">Remember me</label>
        </div>

        <button type="submit" class="btn btn-primary w-100 mb-3">Sign Up</button>

        <div class="text-center">
          <a href="/signin" class="btn btn-link">Already a member? Sign In!</a>
          <a href="/landing" class="btn btn-secondary">Continue as Guest</a>
        </div>
      </div>
    </div>
  </form>
</div>

<footer class="mt-5 text-center text-muted">
  <p>© 2025 Skill Hub. All rights reserved.</p>
</footer>

<!-- Bootstrap 5 JS (lighter than Bootstrap 3) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="./assets/js/common.js"></script>

</body>
</html>
